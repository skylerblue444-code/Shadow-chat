<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShadowChat</title>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>ShadowChat</h1>
    <nav>
      <button id="btn-feed">Feed</button>
      <button id="btn-chat">Chat</button>
      <button id="btn-wallet">Wallet</button>
    </nav>
  </header>

  <main>
    <!-- Feed Section -->
    <section id="feed" class="active">
      <h2>Global Feed</h2>
      <div id="feed-container">
        <p>Loading feed...</p>
      </div>
    </section>

    <!-- Chat Section -->
    <section id="chat">
      <h2>Chat Room</h2>
      <div id="chat-container">
        <div id="messages"></div>
        <input type="text" id="chat-input" placeholder="Type your message..." />
        <button id="send-btn">Send</button>
      </div>
    </section>

    <!-- Wallet Section -->
    <section id="wallet">
      <h2>Crypto Wallet</h2>
      <p>BTC: <span id="btc-balance">0</span></p>
      <p>DOGE: <span id="doge-balance">0</span></p>
      <p>TrumpCoin: <span id="trump-balance">0</span></p>
      <button id="refresh-wallet">Refresh</button>
    </section>
  </main>

  <footer>
    <p>© 2026 ShadowChat • Built for Web3 & AI-powered social interaction</p>
  </footer>

  <!-- JS -->
  <script src="scripts.js"></script>
</body>
</html>
